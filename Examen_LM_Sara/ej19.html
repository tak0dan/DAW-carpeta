<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ej19 - Mostrar solo una opción</title>
</head>
<body>
    <h1>Mostrar solo una opción de una pregunta aleatoria</h1>
    <label>Opción:
        <select id="selectOpcion">
            <option value="A">A</option>
            <option value="B">B</option>
            <option value="C">C</option>
            <option value="D">D</option>
        </select>
    </label>
    <input type="button" id="boton" value="Mostrar">
    <br><br>
    <div id="resultado"></div>

    <script>
        let url = "http://192.168.1.132:8787/examen2.json"
        let selectOpcion = document.getElementById("selectOpcion")
        let boton = document.getElementById("boton")
        let resultado = document.getElementById("resultado")
        let preguntas = []

        function numeroAleatorio(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min
        }

        fetch(url)
            .then(r => r.json())
            .then(data => preguntas = data)
            .catch(e => console.error(e))

        boton.addEventListener("click", () => {
            let n = numeroAleatorio(0, preguntas.length - 1)
            let p = preguntas[n]
            let opc = selectOpcion.value
            let texto
            if (opc === "A") texto = p.opcion_a
            else if (opc === "B") texto = p.opcion_b
            else if (opc === "C") texto = p.opcion_c
            else if (opc === "D") texto = p.opcion_d
            resultado.innerHTML = `
                <p><strong>${p.pregunta}</strong> <em>(ID: ${p.id})</em></p>
                <p style="font-size:1.2em;color:blue">Opción ${opc}: ${texto}</p>
                <p style="color:gray">Las demás opciones están ocultas</p>
            `
        })
    </script>
</body>
</html>
