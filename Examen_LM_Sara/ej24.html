<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ej24 - Media de longitud de preguntas</title>
</head>
<body>
    <h1>Calcular la media de caracteres de las preguntas</h1>
    <input type="button" id="boton" value="Calcular media">
    <br><br>
    <div id="resultado"></div>

    <script>
        let url = "http://192.168.1.132:8787/examen2.json"
        let boton = document.getElementById("boton")
        let resultado = document.getElementById("resultado")
        let preguntas = []

        fetch(url)
            .then(r => r.json())
            .then(data => preguntas = data)
            .catch(e => console.error(e))

        boton.addEventListener("click", () => {
            let longitudes = preguntas.map(p => p.pregunta.length)
            let suma = longitudes.reduce((a, b) => a + b, 0)
            let media = (suma / preguntas.length).toFixed(2)
            let minima = Math.min(...longitudes)
            let maxima = Math.max(...longitudes)
            let pMin = preguntas[longitudes.indexOf(minima)]
            let pMax = preguntas[longitudes.indexOf(maxima)]
            resultado.innerHTML = `
                <p>Suma total de caracteres: <strong>${suma}</strong></p>
                <p>Media de caracteres por pregunta: <strong style="font-size:1.4em">${media}</strong></p>
                <p>Pregunta más corta (${minima} caracteres):<br><em>${pMin.pregunta}</em></p>
                <p>Pregunta más larga (${maxima} caracteres):<br><em>${pMax.pregunta}</em></p>
            `
        })
    </script>
</body>
</html>
