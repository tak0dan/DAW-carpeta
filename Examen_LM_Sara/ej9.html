<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ej9 - Ordenar alfabéticamente</title>
</head>
<body>
    <h1>Preguntas ordenadas alfabéticamente</h1>
    <input type="button" id="boton" value="Ordenar A-Z">
    <br><br>
    <div id="resultado"></div>

    <script>
        let url = "http://192.168.1.132:8787/examen2.json"
        let boton = document.getElementById("boton")
        let resultado = document.getElementById("resultado")
        let preguntas = []

        fetch(url)
            .then(r => r.json())
            .then(data => preguntas = data)
            .catch(e => console.error(e))

        boton.addEventListener("click", () => {
            let copia = [...preguntas]
            copia.sort((a, b) => a.pregunta.localeCompare(b.pregunta))
            let html = ""
            copia.forEach((p, i) => {
                html += `
                    <div style="border:1px solid #ccc;margin:5px;padding:5px">
                        <strong>${i + 1}.</strong> ${p.pregunta} <em>(ID: ${p.id})</em><br>
                        A) ${p.opcion_a}<br>
                        B) ${p.opcion_b}<br>
                        C) ${p.opcion_c}<br>
                        D) ${p.opcion_d}
                    </div>
                `
            })
            resultado.innerHTML = html
        })
    </script>
</body>
</html>
