<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ej28-2 - Diferencia de longitud sin repetir</title>
</head>
<body>
    <h1>Diferencia de longitud entre opciones (sin repetir preguntas)</h1>
    <input type="button" id="boton" value="Generar">
    <br><br>
    <div id="resultado"></div>

    <script>
        let url = "http://192.168.1.132:8787/examen2.json"
        let boton = document.getElementById("boton")
        let resultado = document.getElementById("resultado")
        let preguntas = []
        let usadas = []

        fetch(url)
            .then(r => r.json())
            .then(data => preguntas = data)
            .catch(e => console.error(e))

        boton.addEventListener("click", () => {
            if (usadas.length >= preguntas.length) {
                resultado.innerHTML = "Ya se han mostrado todas las preguntas"
                return
            }
            let disponibles = preguntas.filter((_, i) => !usadas.includes(i))
            let idx = Math.floor(Math.random() * disponibles.length)
            let p = disponibles[idx]
            usadas.push(preguntas.indexOf(p))
            let difAB = Math.abs(p.opcion_a.length - p.opcion_b.length)
            let difCD = Math.abs(p.opcion_c.length - p.opcion_d.length)
            resultado.innerHTML = `
                <p><strong>${p.pregunta}</strong> <em>(ID: ${p.id})</em></p>
                <p>A (${p.opcion_a.length}): ${p.opcion_a}</p>
                <p>B (${p.opcion_b.length}): ${p.opcion_b}</p>
                <p>C (${p.opcion_c.length}): ${p.opcion_c}</p>
                <p>D (${p.opcion_d.length}): ${p.opcion_d}</p>
                <hr>
                <p>Diferencia A vs B: <strong>${difAB}</strong></p>
                <p>Diferencia C vs D: <strong>${difCD}</strong></p>
                <p>Quedan ${preguntas.length - usadas.length} sin mostrar</p>
            `
        })
    </script>
</body>
</html>
