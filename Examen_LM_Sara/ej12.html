<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ej12 - Preguntas más largas que X</title>
</head>
<body>
    <h1>Preguntas con más de X caracteres</h1>
    Mínimo de caracteres: <input type="number" id="inputChars" value="50">
    <input type="button" id="boton" value="Filtrar">
    <br><br>
    <div id="resultado"></div>

    <script>
        let url = "http://192.168.1.132:8787/examen2.json"
        let inputChars = document.getElementById("inputChars")
        let boton = document.getElementById("boton")
        let resultado = document.getElementById("resultado")
        let preguntas = []

        fetch(url)
            .then(r => r.json())
            .then(data => preguntas = data)
            .catch(e => console.error(e))

        boton.addEventListener("click", () => {
            let min = parseInt(inputChars.value)
            let filtradas = preguntas.filter(p => p.pregunta.length > min)
            if (filtradas.length === 0) {
                resultado.innerHTML = "Ninguna pregunta tiene más de " + min + " caracteres"
                return
            }
            let html = "<p>" + filtradas.length + " preguntas tienen más de " + min + " caracteres:</p>"
            filtradas.forEach((p, i) => {
                html += `
                    <div style="border:1px solid #ccc;margin:5px;padding:5px">
                        <strong>${i + 1}.</strong> ${p.pregunta} <em>(ID: ${p.id}, ${p.pregunta.length} caracteres)</em><br>
                        A) ${p.opcion_a}<br>
                        B) ${p.opcion_b}<br>
                        C) ${p.opcion_c}<br>
                        D) ${p.opcion_d}
                    </div>
                `
            })
            resultado.innerHTML = html
        })
    </script>
</body>
</html>
