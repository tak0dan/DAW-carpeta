<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ej7 - Buscar por palabra clave</title>
</head>
<body>
    <h1>Buscar preguntas por palabra clave</h1>
    Palabra: <input type="text" id="inputPalabra">
    <input type="button" id="boton" value="Buscar">
    <br><br>
    <div id="resultado"></div>

    <script>
        let url = "http://192.168.1.132:8787/examen2.json"
        let inputPalabra = document.getElementById("inputPalabra")
        let boton = document.getElementById("boton")
        let resultado = document.getElementById("resultado")
        let preguntas = []

        fetch(url)
            .then(r => r.json())
            .then(data => preguntas = data)
            .catch(e => console.error(e))

        boton.addEventListener("click", () => {
            let palabra = inputPalabra.value.toLowerCase()
            if (!palabra) {
                resultado.innerHTML = "Introduce una palabra"
                return
            }
            let filtradas = preguntas.filter(p =>
                p.pregunta.toLowerCase().includes(palabra)
            )
            if (filtradas.length === 0) {
                resultado.innerHTML = "No se encontraron preguntas con esa palabra"
                return
            }
            let html = "<p>Se encontraron <strong>" + filtradas.length + "</strong> preguntas:</p>"
            filtradas.forEach((p, i) => {
                html += `
                    <div style="border:1px solid #ccc;margin:5px;padding:5px">
                        <strong>${i + 1}.</strong> ${p.pregunta} <em>(ID: ${p.id})</em><br>
                        A) ${p.opcion_a}<br>
                        B) ${p.opcion_b}<br>
                        C) ${p.opcion_c}<br>
                        D) ${p.opcion_d}
                    </div>
                `
            })
            resultado.innerHTML = html
        })
    </script>
</body>
</html>
