<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ej18-2 - Opciones desordenadas sin repetir</title>
</head>
<body>
    <h1>Pregunta aleatoria con opciones desordenadas (sin repetir)</h1>
    <input type="button" id="boton" value="Dame una pregunta">
    <br><br>
    <div id="resultado"></div>

    <script>
        let url = "http://192.168.1.132:8787/examen2.json"
        let boton = document.getElementById("boton")
        let resultado = document.getElementById("resultado")
        let preguntas = []
        let usadas = []

        function desordenar(arr) {
            let copia = [...arr]
            for (let i = copia.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1))
                ;[copia[i], copia[j]] = [copia[j], copia[i]]
            }
            return copia
        }

        fetch(url)
            .then(r => r.json())
            .then(data => preguntas = data)
            .catch(e => console.error(e))

        boton.addEventListener("click", () => {
            if (usadas.length >= preguntas.length) {
                resultado.innerHTML = "Ya se han mostrado todas las preguntas"
                return
            }
            let disponibles = preguntas.filter((_, i) => !usadas.includes(i))
            let idx = Math.floor(Math.random() * disponibles.length)
            let p = disponibles[idx]
            usadas.push(preguntas.indexOf(p))
            let opciones = [
                { letra: "A", texto: p.opcion_a },
                { letra: "B", texto: p.opcion_b },
                { letra: "C", texto: p.opcion_c },
                { letra: "D", texto: p.opcion_d }
            ]
            let desordenadas = desordenar(opciones)
            let html = `<p><strong>${p.pregunta}</strong> <em>(ID: ${p.id})</em></p>`
            desordenadas.forEach(o => {
                html += `<p>${o.letra}) ${o.texto}</p>`
            })
            html += `<p style="color:gray">Quedan ${preguntas.length - usadas.length} sin mostrar</p>`
            resultado.innerHTML = html
        })
    </script>
</body>
</html>
