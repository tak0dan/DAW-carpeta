<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ej21-2 - Destacar opción sin repetir</title>
</head>
<body>
    <h1>Pregunta aleatoria destacando opción (sin repetir preguntas)</h1>
    Palabra a buscar: <input type="text" id="inputPalabra" value="XML">
    <input type="button" id="boton" value="Mostrar">
    <br><br>
    <div id="resultado"></div>

    <script>
        let url = "http://192.168.1.132:8787/examen2.json"
        let inputPalabra = document.getElementById("inputPalabra")
        let boton = document.getElementById("boton")
        let resultado = document.getElementById("resultado")
        let preguntas = []
        let usadas = []

        fetch(url)
            .then(r => r.json())
            .then(data => preguntas = data)
            .catch(e => console.error(e))

        boton.addEventListener("click", () => {
            let palabra = inputPalabra.value.toLowerCase()
            if (!palabra) {
                resultado.innerHTML = "Introduce una palabra"
                return
            }
            if (usadas.length >= preguntas.length) {
                resultado.innerHTML = "Ya se han mostrado todas las preguntas"
                return
            }
            let disponibles = preguntas.filter((_, i) => !usadas.includes(i))
            let idx = Math.floor(Math.random() * disponibles.length)
            let p = disponibles[idx]
            usadas.push(preguntas.indexOf(p))
            let opciones = [
                { letra: "A", texto: p.opcion_a },
                { letra: "B", texto: p.opcion_b },
                { letra: "C", texto: p.opcion_c },
                { letra: "D", texto: p.opcion_d }
            ]
            let html = `<p><strong>${p.pregunta}</strong> <em>(ID: ${p.id})</em></p>`
            opciones.forEach(o => {
                let contiene = o.texto.toLowerCase().includes(palabra)
                let estilo = contiene ? "background:yellow;font-weight:bold" : ""
                html += `<p style="${estilo}">${o.letra}) ${o.texto}</p>`
            })
            html += `<p style="color:gray">Quedan ${preguntas.length - usadas.length} sin mostrar</p>`
            resultado.innerHTML = html
        })
    </script>
</body>
</html>
