<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ej5 - Contar preguntas</title>
</head>
<body>
    <h1>Contar preguntas</h1>
    <input type="button" id="boton" value="¿Cuántas preguntas hay?">
    <br><br>
    <div id="resultado"></div>

    <script>
        let url = "http://192.168.1.132:8787/examen2.json"
        let boton = document.getElementById("boton")
        let resultado = document.getElementById("resultado")
        let preguntas = []

        fetch(url)
            .then(r => r.json())
            .then(data => preguntas = data)
            .catch(e => console.error(e))

        boton.addEventListener("click", () => {
            resultado.innerHTML = "El total de preguntas es: <strong>" + preguntas.length + "</strong>"
        })
    </script>
</body>
</html>
