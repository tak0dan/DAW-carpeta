<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ej11 - N preguntas consecutivas</title>
</head>
<body>
    <h1>Mostrar N preguntas consecutivas</h1>
    Posición inicial: <input type="number" id="inputPos" value="0">
    Cantidad: <input type="number" id="inputCant" value="3">
    <input type="button" id="boton" value="Mostrar">
    <br><br>
    <div id="resultado"></div>

    <script>
        let url = "http://192.168.1.132:8787/examen2.json"
        let inputPos = document.getElementById("inputPos")
        let inputCant = document.getElementById("inputCant")
        let boton = document.getElementById("boton")
        let resultado = document.getElementById("resultado")
        let preguntas = []

        fetch(url)
            .then(r => r.json())
            .then(data => preguntas = data)
            .catch(e => console.error(e))

        boton.addEventListener("click", () => {
            let pos = parseInt(inputPos.value)
            let cant = parseInt(inputCant.value)
            if (pos < 0 || pos >= preguntas.length || cant <= 0) {
                resultado.innerHTML = "Valores inválidos"
                return
            }
            let seleccion = preguntas.slice(pos, pos + cant)
            let html = "<p>Mostrando " + seleccion.length + " preguntas desde posición " + pos + ":</p>"
            seleccion.forEach((p, i) => {
                html += `
                    <div style="border:1px solid #ccc;margin:5px;padding:5px">
                        <strong>${pos + i + 1}.</strong> ${p.pregunta} <em>(ID: ${p.id})</em><br>
                        A) ${p.opcion_a}<br>
                        B) ${p.opcion_b}<br>
                        C) ${p.opcion_c}<br>
                        D) ${p.opcion_d}
                    </div>
                `
            })
            resultado.innerHTML = html
        })
    </script>
</body>
</html>
