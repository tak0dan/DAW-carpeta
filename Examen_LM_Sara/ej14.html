<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ej14 - Pregunta aleatoria</title>
</head>
<body>
    <h1>Pregunta aleatoria</h1>
    <input type="button" id="boton" value="Dame una pregunta aleatoria">
    <br><br>
    <div id="resultado"></div>

    <script>
        let url = "http://192.168.1.132:8787/examen2.json"
        let boton = document.getElementById("boton")
        let resultado = document.getElementById("resultado")
        let preguntas = []

        function numeroAleatorio(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min
        }

        fetch(url)
            .then(r => r.json())
            .then(data => preguntas = data)
            .catch(e => console.error(e))

        boton.addEventListener("click", () => {
            let n = numeroAleatorio(0, preguntas.length - 1)
            let p = preguntas[n]
            resultado.innerHTML = `
                <p><strong>${p.pregunta}</strong> <em>(ID: ${p.id})</em></p>
                <p>A) ${p.opcion_a}</p>
                <p>B) ${p.opcion_b}</p>
                <p>C) ${p.opcion_c}</p>
                <p>D) ${p.opcion_d}</p>
            `
        })
    </script>
</body>
</html>
