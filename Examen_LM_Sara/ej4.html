<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ej4 - Mostrar por posición</title>
</head>
<body>
    <h1>Mostrar pregunta por posición</h1>
    Posición (0 a N-1): <input type="number" id="inputPos" value="0">
    <input type="button" id="boton" value="Mostrar">
    <br><br>
    <div id="resultado"></div>

    <script>
        let url = "http://192.168.1.132:8787/examen2.json"
        let inputPos = document.getElementById("inputPos")
        let boton = document.getElementById("boton")
        let resultado = document.getElementById("resultado")
        let preguntas = []

        fetch(url)
            .then(r => r.json())
            .then(data => preguntas = data)
            .catch(e => console.error(e))

        boton.addEventListener("click", () => {
            let pos = parseInt(inputPos.value)
            if (pos < 0 || pos >= preguntas.length) {
                resultado.innerHTML = "Posición inválida (0 a " + (preguntas.length - 1) + ")"
                return
            }
            let p = preguntas[pos]
            resultado.innerHTML = `
                <p><strong>${p.pregunta}</strong> <em>(ID: ${p.id})</em></p>
                <p>A) ${p.opcion_a}</p>
                <p>B) ${p.opcion_b}</p>
                <p>C) ${p.opcion_c}</p>
                <p>D) ${p.opcion_d}</p>
            `
        })
    </script>
</body>
</html>
