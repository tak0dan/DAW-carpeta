<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ej15 - N preguntas aleatorias</title>
</head>
<body>
    <h1>Mostrar N preguntas aleatorias</h1>
    Cantidad: <input type="number" id="inputCant" value="3">
    <input type="button" id="boton" value="Mostrar">
    <br><br>
    <div id="resultado"></div>

    <script>
        let url = "http://192.168.1.132:8787/examen2.json"
        let inputCant = document.getElementById("inputCant")
        let boton = document.getElementById("boton")
        let resultado = document.getElementById("resultado")
        let preguntas = []

        function numeroAleatorio(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min
        }

        fetch(url)
            .then(r => r.json())
            .then(data => preguntas = data)
            .catch(e => console.error(e))

        boton.addEventListener("click", () => {
            let cant = parseInt(inputCant.value)
            if (cant <= 0 || cant > preguntas.length) {
                resultado.innerHTML = "Cantidad inválida (1 a " + preguntas.length + ")"
                return
            }
            let indices = []
            while (indices.length < cant) {
                let n = numeroAleatorio(0, preguntas.length - 1)
                if (!indices.includes(n)) indices.push(n)
            }
            let html = ""
            indices.forEach((idx, i) => {
                let p = preguntas[idx]
                html += `
                    <div style="border:1px solid #ccc;margin:5px;padding:5px">
                        <strong>${i + 1}.</strong> ${p.pregunta} <em>(ID: ${p.id})</em><br>
                        A) ${p.opcion_a}<br>
                        B) ${p.opcion_b}<br>
                        C) ${p.opcion_c}<br>
                        D) ${p.opcion_d}
                    </div>
                `
            })
            resultado.innerHTML = html
        })
    </script>
</body>
</html>
