<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ej19-2 - Mostrar solo una opción sin repetir</title>
</head>
<body>
    <h1>Mostrar solo una opción (sin repetir preguntas)</h1>
    <label>Opción:
        <select id="selectOpcion">
            <option value="A">A</option>
            <option value="B">B</option>
            <option value="C">C</option>
            <option value="D">D</option>
        </select>
    </label>
    <input type="button" id="boton" value="Mostrar">
    <br><br>
    <div id="resultado"></div>

    <script>
        let url = "http://192.168.1.132:8787/examen2.json"
        let selectOpcion = document.getElementById("selectOpcion")
        let boton = document.getElementById("boton")
        let resultado = document.getElementById("resultado")
        let preguntas = []
        let usadas = []

        fetch(url)
            .then(r => r.json())
            .then(data => preguntas = data)
            .catch(e => console.error(e))

        boton.addEventListener("click", () => {
            if (usadas.length >= preguntas.length) {
                resultado.innerHTML = "Ya se han mostrado todas las preguntas"
                return
            }
            let disponibles = preguntas.filter((_, i) => !usadas.includes(i))
            let idx = Math.floor(Math.random() * disponibles.length)
            let p = disponibles[idx]
            usadas.push(preguntas.indexOf(p))
            let opc = selectOpcion.value
            let texto
            if (opc === "A") texto = p.opcion_a
            else if (opc === "B") texto = p.opcion_b
            else if (opc === "C") texto = p.opcion_c
            else if (opc === "D") texto = p.opcion_d
            resultado.innerHTML = `
                <p><strong>${p.pregunta}</strong> <em>(ID: ${p.id})</em></p>
                <p style="font-size:1.2em;color:blue">Opción ${opc}: ${texto}</p>
                <p style="color:gray">Quedan ${preguntas.length - usadas.length} sin mostrar</p>
            `
        })
    </script>
</body>
</html>
